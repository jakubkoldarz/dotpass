version: '3.8'

services:
  db-postgres:
    image: postgres:latest
    container_name: dotpass-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - dotpass_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 15s

  emqx-broker:
    image: emqx/emqx:latest
    container_name: emqx-container
    restart: always
    volumes:
      - emqx_data:/opt/emqx/data
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "1883:1883"   # ESP32 for testing
      - "8883:8883"   # ESP32 SSL
      - "18083:18083" # Dashboard & REST API
    environment:
      - "EMQX_DASHBOARD__DEFAULT_PASSWORD=${MQTT_BROKER_PASSWORD}"

  dotpass-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend-container
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      db-postgres:
        condition: service_healthy
      emqx-broker:
        condition: service_started
    environment:
      - ConnectionStrings__DefaultConnection=Host=db-postgres;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - EMQX_API_URL=${EMQX_API_URL}
      - EMQX_API_KEY=${EMQX_API_KEY}
      - EMQX_API_SECRET=${EMQX_API_SECRET}

volumes:
  dotpass_data:
  emqx_data: