version: '3.8'

services:
  db-postgres:
    image: postgres:latest
    container_name: dotpass-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - dotpass_data:/var/lib/postgresql/data
  emqx-broker:
    image: emqx/emqx:latest
    container_name: emqx-container
    restart: always
    ports:
      - "1883:1883"   # ESP32
      - "18083:18083" # Dashboard & REST API
    environment:
      - "EMQX_DASHBOARD__DEFAULT_PASSWORD=${MQTT_BROKER_PASSWORD}"

  dotpass-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend-container
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db-postgres
      - emqx-broker
    environment:
      - ConnectionStrings__DefaultConnection=Host=db-postgres;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
      - MQTT__Host=emqx-broker

volumes:
  dotpass_data: