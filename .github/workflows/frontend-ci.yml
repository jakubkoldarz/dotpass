name: CI - Frontend Android

on:
  push:
    branches: [ "main" ]
    paths:
      - 'mobile/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'mobile/**'

jobs:
  build-frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile

    steps:
    - name: Checkout kodu
      uses: actions/checkout@v4

    - name: Konfiguracja Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: mobile/package-lock.json

    - name: Instalacja zależności JavaScript
      run: npm install

    - name: Konfiguracja JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Gradle Cache
      uses: gradle/actions/setup-gradle@v3
      with:
        build-root-directory: mobile/android

    - name: Uruchomienie testów (Jest)
      run: npm test -- --watchAll=false

    - name: Budowanie Android APK (Debug)
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Automatyczny Release na GitHubie
      uses: softprops/action-gh-release@v2
      with:
        tag_name: app-build-${{ github.run_number }}
        name: Aplikacja Android - Build #${{ github.run_number }}
        body: |
          Automatyczna paczka testowa React Native z monorepo (Wersja Debug).
          Zbudowano z commita: ${{ github.sha }}
        draft: false
        prerelease: false
        files: mobile/android/app/build/outputs/apk/debug/app-debug.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}